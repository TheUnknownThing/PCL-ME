name: Publish (Beta)

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish assets to
        required: true
        type: string
      source_ref:
        description: Git ref to build from. Defaults to release_tag.
        required: false
        type: string

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease }}
    strategy:
      matrix:
        include:
          - configuration: Release
            runner: ubuntu-latest
            rid: linux-x64
            artifact_name: PCL-ME_Beta_linux-x64
          - configuration: Release
            runner: ubuntu-24.04-arm
            rid: linux-arm64
            artifact_name: PCL-ME_Beta_linux-arm64
          - configuration: Release
            runner: ubuntu-latest
            rid: win-x64
            artifact_name: PCL-ME_Beta_win-x64
          - configuration: Release
            runner: ubuntu-latest
            rid: win-arm64
            artifact_name: PCL-ME_Beta_win-arm64
          - configuration: Release
            runner: macos-latest
            rid: osx-arm64
            artifact_name: PCL-ME_Beta_osx-arm64
      fail-fast: false

    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: ${{ matrix.configuration }}
      source_ref: ${{ inputs.source_ref || inputs.release_tag || github.event.release.tag_name }}
      runner: ${{ matrix.runner }}
      rid: ${{ matrix.rid }}
      artifact_name: ${{ matrix.artifact_name }}
    secrets: inherit

  changelog:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease }}
    steps:
      - name: Checkout all
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref || inputs.release_tag || github.event.release.tag_name }}

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        run: git-cliff --latest -o CHANGELOG.md

      - name: Add changelog to release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ inputs.release_tag || github.event.release.tag_name }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload_release_assets:
    permissions:
      contents: write
    needs: [build, changelog]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: PCL-ME_Beta_*
          path: ./artifact
          merge-multiple: true

      - name: Upload packaged artifacts to release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ inputs.release_tag || github.event.release.tag_name }}
          files: |
            artifact/**/PCL-ME-*.zip
            artifact/**/PCL-ME-*.tar.gz
            artifact/**/PCL-ME-*.exe
            artifact/**/PCL-ME-*.zip.asc
            artifact/**/PCL-ME-*.tar.gz.asc
            artifact/**/PCL-ME-*.exe.asc
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_aur:
    name: Update AUR package
    needs: upload_release_assets
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
      AUR_PACKAGE: pcl-me-bin
      AUR_REPOSITORY: ssh://aur@aur.archlinux.org/pcl-me-bin.git
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install AUR SSH key
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "AUR_SSH_PRIVATE_KEY is required to update the AUR package." >&2
            exit 1
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Update and push AUR package
        shell: bash
        run: |
          set -euo pipefail

          pkgver="${RELEASE_TAG#v}"
          pkgver="${pkgver/-beta./beta.}"

          linux_x64_sha="$(gh release view "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[] | select(.name == "PCL-ME-linux-x64.tar.gz") | .digest' | sed 's/^sha256://')"
          linux_arm64_sha="$(gh release view "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[] | select(.name == "PCL-ME-linux-arm64.tar.gz") | .digest' | sed 's/^sha256://')"

          if [[ -z "$linux_x64_sha" || -z "$linux_arm64_sha" ]]; then
            echo "Could not resolve Linux release asset checksums for $RELEASE_TAG." >&2
            exit 1
          fi

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          git clone "$AUR_REPOSITORY" "$workdir/$AUR_PACKAGE"
          cd "$workdir/$AUR_PACKAGE"

          cat > pcl-me.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=PCL-ME
          Comment=Cross-platform Minecraft launcher based on Plain Craft Launcher
          Exec=pcl-me
          Icon=pcl-me
          Terminal=false
          Categories=Game;
          StartupNotify=true
          EOF

          desktop_sha="$(sha256sum pcl-me.desktop | awk '{print $1}')"
          icon_sha="$(curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${RELEASE_TAG}/PCL.Frontend.Avalonia/Assets/icon.png" | sha256sum | awk '{print $1}')"
          license_sha="$(curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${RELEASE_TAG}/LICENSE" | sha256sum | awk '{print $1}')"
          frontend_license_sha="$(curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${RELEASE_TAG}/PCL.Frontend.Avalonia/LICENSE" | sha256sum | awk '{print $1}')"

          cat > PKGBUILD <<EOF
          # Maintainer: TheUnknownThing <TheUnknownThing@users.noreply.github.com>

          pkgname=pcl-me-bin
          pkgver=${pkgver}
          pkgrel=1
          pkgdesc='Cross-platform Minecraft launcher based on Plain Craft Launcher'
          arch=('x86_64' 'aarch64')
          url='https://github.com/TheUnknownThing/PCL-ME'
          license=('Apache-2.0' 'custom')
          depends=(
            'fontconfig'
            'gcc-libs'
            'glibc'
            'libice'
            'libsm'
            'libx11'
            'libxcursor'
            'libxkbcommon'
            'libxrandr'
          )
          optdepends=(
            'java-runtime: launch Minecraft with a system Java runtime'
            'xdg-utils: open external links from the launcher'
          )
          provides=('pcl-me')
          conflicts=('pcl-me')
          options=('!strip')
          _tag="v\${pkgver/beta./-beta.}"
          source=(
            'pcl-me.desktop'
            "pcl-me.png::https://raw.githubusercontent.com/TheUnknownThing/PCL-ME/\${_tag}/PCL.Frontend.Avalonia/Assets/icon.png"
            "LICENSE::https://raw.githubusercontent.com/TheUnknownThing/PCL-ME/\${_tag}/LICENSE"
            "FRONTEND-LICENSE::https://raw.githubusercontent.com/TheUnknownThing/PCL-ME/\${_tag}/PCL.Frontend.Avalonia/LICENSE"
          )
          source_x86_64=("PCL-ME-linux-x64-\${_tag}.tar.gz::https://github.com/TheUnknownThing/PCL-ME/releases/download/\${_tag}/PCL-ME-linux-x64.tar.gz")
          source_aarch64=("PCL-ME-linux-arm64-\${_tag}.tar.gz::https://github.com/TheUnknownThing/PCL-ME/releases/download/\${_tag}/PCL-ME-linux-arm64.tar.gz")
          sha256sums=(
            '${desktop_sha}'
            '${icon_sha}'
            '${license_sha}'
            '${frontend_license_sha}'
          )
          sha256sums_x86_64=('${linux_x64_sha}')
          sha256sums_aarch64=('${linux_arm64_sha}')

          package() {
            install -Dm755 "\${srcdir}/PCL-ME" "\${pkgdir}/usr/bin/pcl-me"
            install -Dm644 "\${srcdir}/pcl-me.desktop" "\${pkgdir}/usr/share/applications/pcl-me.desktop"
            install -Dm644 "\${srcdir}/pcl-me.png" "\${pkgdir}/usr/share/icons/hicolor/256x256/apps/pcl-me.png"
            install -Dm644 "\${srcdir}/LICENSE" "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
            install -Dm644 "\${srcdir}/FRONTEND-LICENSE" "\${pkgdir}/usr/share/licenses/\${pkgname}/FRONTEND-LICENSE"
          }
          EOF

          cat > .SRCINFO <<EOF
          pkgbase = pcl-me-bin
          	pkgdesc = Cross-platform Minecraft launcher based on Plain Craft Launcher
          	pkgver = ${pkgver}
          	pkgrel = 1
          	url = https://github.com/TheUnknownThing/PCL-ME
          	arch = x86_64
          	arch = aarch64
          	license = Apache-2.0
          	license = custom
          	depends = fontconfig
          	depends = gcc-libs
          	depends = glibc
          	depends = libice
          	depends = libsm
          	depends = libx11
          	depends = libxcursor
          	depends = libxkbcommon
          	depends = libxrandr
          	optdepends = java-runtime: launch Minecraft with a system Java runtime
          	optdepends = xdg-utils: open external links from the launcher
          	provides = pcl-me
          	conflicts = pcl-me
          	options = !strip
          	source = pcl-me.desktop
          	source = pcl-me.png::https://raw.githubusercontent.com/TheUnknownThing/PCL-ME/${RELEASE_TAG}/PCL.Frontend.Avalonia/Assets/icon.png
          	source = LICENSE::https://raw.githubusercontent.com/TheUnknownThing/PCL-ME/${RELEASE_TAG}/LICENSE
          	source = FRONTEND-LICENSE::https://raw.githubusercontent.com/TheUnknownThing/PCL-ME/${RELEASE_TAG}/PCL.Frontend.Avalonia/LICENSE
          	sha256sums = ${desktop_sha}
          	sha256sums = ${icon_sha}
          	sha256sums = ${license_sha}
          	sha256sums = ${frontend_license_sha}
          	source_x86_64 = PCL-ME-linux-x64-${RELEASE_TAG}.tar.gz::https://github.com/TheUnknownThing/PCL-ME/releases/download/${RELEASE_TAG}/PCL-ME-linux-x64.tar.gz
          	sha256sums_x86_64 = ${linux_x64_sha}
          	source_aarch64 = PCL-ME-linux-arm64-${RELEASE_TAG}.tar.gz::https://github.com/TheUnknownThing/PCL-ME/releases/download/${RELEASE_TAG}/PCL-ME-linux-arm64.tar.gz
          	sha256sums_aarch64 = ${linux_arm64_sha}

          pkgname = pcl-me-bin
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi

          git add PKGBUILD .SRCINFO pcl-me.desktop
          git commit -m "Update to ${RELEASE_TAG}"
          git push origin master
