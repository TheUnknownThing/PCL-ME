name: Build (Reusable)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      configuration:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      runner:
        required: true
        type: string
      rid:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
    secrets:
      RELEASE_GPG_PRIVATE_KEY:
        required: true
      RELEASE_GPG_PASSPHRASE:
        required: false

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    env:
      LANG: en_US.UTF-8
      RELEASE_GPG_FINGERPRINT: 4201C9D251B88EB5D2DA9F73D9F460F471F3C6F3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set Describe
        run: |
          describe=`git describe --tags --always`
          echo "describe=$describe" >> $GITHUB_ENV
          source_sha=`git rev-parse HEAD`
          echo "source_sha=$source_sha" >> $GITHUB_ENV

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Update Help
        continue-on-error: true
        shell: bash
        run: |
          cd ..
          help_repo_base="https://github.com/PCL-Community/PCL2"
          help_repo_url="${help_repo_base}CEHelp.git"
          git clone "$help_repo_url" -b master --single-branch --depth 1 help-docs
          cd help-docs
          rm -f ./* || true
          zip -r Help.zip . -x "./.*/*"
          mkdir -p "${{ github.workspace }}/PCL.Frontend.Avalonia/Assets/LauncherAssets/Resources"
          cp -f Help.zip "${{ github.workspace }}/PCL.Frontend.Avalonia/Assets/LauncherAssets/Resources/Help.zip"
          cd ..
          rm -rf help-docs
          cd "${{ github.workspace }}"

      - name: Package Frontend
        shell: bash
        env:
          PCL_WRITE_SECRET: '1'
          PCL_MS_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          PCL_CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          PCL_NAID_CLIENT_ID: ${{ secrets.NAID_CLIENT_ID }}
          PCL_NAID_CLIENT_SECRET: ${{ secrets.NAID_CLIENT_SECRET }}
          PCL_LINK_SERVER_ROOT: ${{ secrets.LINK_SERVER_ROOTS }}
          PCL_LOBBY_DEFAULT_SECRET: ${{ secrets.LOBBY_DEFAULT_SECRET }}
          PCL_GITHUB_SHA: ${{ env.source_sha }}
          CONFIGURATION: ${{ inputs.configuration }}
          ARTIFACT_ROOT: ${{ github.workspace }}/artifact
          APP_VERSION: ${{ env.describe }}
        run: |
          chmod +x ./PCL.Frontend.Avalonia/scripts/package-frontend.sh
          ./PCL.Frontend.Avalonia/scripts/package-frontend.sh "${{ inputs.rid }}"

      - name: Install GPG
        shell: bash
        run: |
          set -euo pipefail
          if command -v gpg >/dev/null 2>&1; then
            exit 0
          fi

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install gnupg
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y gnupg
          else
            echo "Unsupported runner OS for GPG signing: $RUNNER_OS" >&2
            exit 1
          fi

      - name: Sign packaged artifacts
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_GPG_PRIVATE_KEY" ]]; then
            echo "RELEASE_GPG_PRIVATE_KEY is required for release signing." >&2
            exit 1
          fi

          export GNUPGHOME
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          trap 'rm -rf "$GNUPGHOME"' EXIT

          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import

          signing_key="$(gpg --batch --with-colons --list-secret-keys "$RELEASE_GPG_FINGERPRINT" | awk -F: '$1 == "fpr" { print $10; exit }')"
          if [[ "$signing_key" != "$RELEASE_GPG_FINGERPRINT" ]]; then
            echo "Imported release signing key does not match $RELEASE_GPG_FINGERPRINT." >&2
            exit 1
          fi

          signed_count=0
          while IFS= read -r -d '' artifact_file; do
            sign_args=(
              --batch
              --yes
              --pinentry-mode loopback
              --local-user "$RELEASE_GPG_FINGERPRINT"
              --detach-sign
              --armor
              --output "$artifact_file.asc"
            )

            if [[ -n "$RELEASE_GPG_PASSPHRASE" ]]; then
              sign_args+=(--passphrase "$RELEASE_GPG_PASSPHRASE")
            fi

            gpg "${sign_args[@]}" "$artifact_file"
            gpg --batch --verify "$artifact_file.asc" "$artifact_file"
            signed_count=$((signed_count + 1))
          done < <(find artifact -type f \( -name 'PCL-ME-*.zip' -o -name 'PCL-ME-*.tar.gz' -o -name 'PCL-ME-*.exe' \) -print0)

          if [[ "$signed_count" -eq 0 ]]; then
            echo "No packaged artifacts were found to sign." >&2
            exit 1
          fi

      - name: Upload the Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          if-no-files-found: error
          path: |
            artifact/*/PCL-ME-*.zip
            artifact/*/PCL-ME-*.tar.gz
            artifact/*/PCL-ME-*.exe
            artifact/*/PCL-ME-*.zip.asc
            artifact/*/PCL-ME-*.tar.gz.asc
            artifact/*/PCL-ME-*.exe.asc
