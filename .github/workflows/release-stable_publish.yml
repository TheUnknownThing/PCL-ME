name: Publish (Release)

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:
  build:
    if: ${{ !github.event.release.prerelease }}
    strategy:
      matrix:
        include:
          - configuration: Release
            runner: ubuntu-latest
            rid: linux-x64
            artifact_name: PCL-ME_Release_linux-x64
          - configuration: Release
            runner: ubuntu-latest
            rid: win-x64
            artifact_name: PCL-ME_Release_win-x64
          - configuration: Release
            runner: ubuntu-latest
            rid: win-arm64
            artifact_name: PCL-ME_Release_win-arm64
          - configuration: Release
            runner: macos-latest
            rid: osx-arm64
            artifact_name: PCL-ME_Release_osx-arm64
      fail-fast: false

    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: ${{ matrix.configuration }}
      runner: ${{ matrix.runner }}
      rid: ${{ matrix.rid }}
      artifact_name: ${{ matrix.artifact_name }}
    secrets: inherit

  changelog:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ !github.event.release.prerelease }}
    steps:
      - name: Checkout all
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        run: git-cliff --latest -o CHANGELOG.md

      - name: Add changelog to release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload_release_assets:
    permissions:
      contents: write
    needs: [build, changelog]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - artifact_name: PCL-ME_Release_linux-x64
          - artifact_name: PCL-ME_Release_win-x64
          - artifact_name: PCL-ME_Release_win-arm64
          - artifact_name: PCL-ME_Release_osx-arm64
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./artifact

      - name: Upload packaged artifacts to release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: artifact/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
