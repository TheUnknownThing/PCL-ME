startup:
  prompts:
    special_build:
      title: "Special build"
      debug:
        message: "This launcher build was produced for debugging and may be unstable. Set {hint_env_var} to disable this reminder, or open the latest stable release: {latest_release_url}"
      ci:
        message: "This launcher build came from CI and may be incomplete. Set {hint_env_var} to disable this reminder, or open the latest stable release: {latest_release_url}"
      actions:
        continue: "Continue"
        open_release_and_exit: "Open release page and exit"
    eula:
      title: "License agreement"
      message: "You need to review and accept the launcher agreement before continuing. Reference: {eula_url}"
      actions:
        accept: "Accept"
        reject: "Reject and exit"
        open: "Open agreement"
    environment_warning:
      title: "Environment warning"
      message: "The current environment needs attention:\n{warnings}"
      actions:
        acknowledge: "I understand"
launch:
  notifications:
    success: "{instance_name} launched successfully."
    abort_with_hint: "Launch was canceled: {hint}"
    script_export_canceled: "Launch script export finished and the launch was stopped."
    launch_canceled: "Launch was canceled."
    none: ""
  precheck:
    failures:
      instance_path_reserved_chars: "The instance path cannot contain ! or ; ({path})."
      instance_indie_path_reserved_chars: "The independent game path cannot contain ! or ; ({path})."
      instance_not_selected: "No instance is currently selected."
      instance_has_error: "The selected instance is in an invalid state: {detail}"
      no_profile_selected: "Select a login profile before launching."
      microsoft_profile_required: "This instance requires a Microsoft profile."
      auth_profile_required: "This instance requires an Authlib profile."
      auth_server_mismatch: "The selected Authlib account does not match the required auth server."
      microsoft_or_auth_profile_required: "This instance requires either a Microsoft or matching Authlib profile."
      unknown: "The current instance is not ready to launch yet."
  prompts:
    non_ascii_path:
      title: "Non-ASCII path warning"
      message: "{instance_name} is using a path with non-ASCII characters. Some Java runtimes or mods may fail in this environment."
      actions:
        continue: "Continue anyway"
        abort: "Cancel launch"
        disable: "Don't warn again"
    purchase:
      optional:
        title: "Minecraft ownership recommended"
        message: "No Microsoft ownership profile is selected. If you own Minecraft, consider signing in or purchasing it here: {purchase_url}"
        actions:
          buy: "Open purchase page"
          continue: "Continue"
      required:
        title: "Minecraft ownership required"
        message: "This feature requires a Microsoft-owned Minecraft profile."
        actions:
          buy: "Open purchase page"
          demo: "Launch demo mode"
          abort: "Cancel launch"
    java_missing:
      title: "Java runtime missing"
      manual_java7_with_legacy_fixer:
        message: "This instance needs Java 7 and legacy Forge compatibility handling. Install a matching Java 7 runtime manually before launching."
      manual_java7:
        message: "This instance needs Java 7. Install a matching Java 7 runtime manually before launching."
      manual_java8u141_to_320:
        message: "This instance needs Java 8 update 141 through 320. Install a compatible Java 8 runtime manually before launching."
      manual_java8u141_plus:
        message: "This instance needs Java 8 update 141 or newer. Install a compatible Java 8 runtime manually before launching."
      actions:
        confirm: "Close"
      auto_download:
        title: "Download Java runtime"
        message: "No compatible runtime is available. Download and register {version} automatically?"
        actions:
          download: "Download"
          cancel: "Cancel"
    support:
      title: "Launch milestone {launch_count}"
      message: "You have launched the game {launch_count} times. If PCL-ME has been useful, consider sponsoring the project."
      actions:
        sponsor: "Sponsor"
        continue: "Continue"
    java_compatibility:
      title: "Java compatibility warning"
      message: "{runtime_label} may not satisfy the required Java range ({minimum_version} - {maximum_version})."
      actions:
        force_current: "Use current Java"
        use_compatible: "Use compatible Java"
        abort: "Cancel launch"
crash:
  prompts:
    output:
      message: "{message}"
      launch_failure:
        title: "Launch failed"
      manual_analysis:
        title: "Crash analysis"
      actions:
        close: "Close"
        open_instance_settings: "Open instance settings"
        view_log: "View log"
        export_report: "Export report"
  export:
    heading: "Export plan"
    suggested_archive: "- Suggested archive: {archive_name}"
    source_file_count: "- Source file count: {file_count}"
