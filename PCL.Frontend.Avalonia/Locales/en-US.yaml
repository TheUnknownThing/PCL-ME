        title: Cleanroom Overview
      fabric:
        body: >-
          Fabric Loader is a lightweight mod loader for modern Minecraft. You need to install it before using Fabric mods.

          This page provides the Fabric installer download. After downloading it, you still need to open the installer manually to complete setup.
        title: Fabric Overview
      forge:
        body: Forge is a mod loader. You need to install Forge before you can use Forge mods.
        title: Forge Overview
      labymod:
        body: >-
          LabyMod is an optimized Minecraft client.

          This page provides the LabyMod installer download. After downloading it, you still need to open the installer manually to complete setup.
        title: LabyMod Overview
      legacy_fabric:
        body: >-
          Legacy Fabric is a backport of Fabric for older Minecraft versions. You need to install it before using Legacy Fabric mods.

          This page provides the Legacy Fabric installer download. After downloading it, you still need to open the installer manually to complete setup.
        title: Legacy Fabric Overview
      liteloader:
        body: Similar to Forge, LiteLoader can be used to load LiteLoader mods for older Minecraft versions.
        title: LiteLoader Overview
      neoforge:
        body: >-
          NeoForge is a mod loader for Minecraft 1.20.1 and newer. You need it before installing NeoForge mods, and it is also compatible with some Forge mods.

          This page provides the NeoForge installer download. After downloading it, you still need to open the installer manually to complete setup.
        title: NeoForge Overview
      optifine:
        body: OptiFine, also known as HD fix, enables shader installation, high-resolution resource packs, and performance improvements, but it has weaker compatibility with mods.
        title: OptiFine Overview
      quilt:
        body: >-
          Quilt Loader is a lightweight, modular mod loader for modern Minecraft. You need to install it before using Quilt mods.

          This page provides the Quilt installer download. After downloading it, you still need to open the installer manually to complete setup.
        title: Quilt Overview
