startup:
  prompts:
    special_build:
      title: "特殊構建"
      debug:
        message: "目前啟動器為偵錯構建，可能不穩定。可設定環境變數 {hint_env_var} 關閉此提醒，或開啟最新穩定版：{latest_release_url}"
      ci:
        message: "目前啟動器來自 CI 構建，可能並不完整。可設定環境變數 {hint_env_var} 關閉此提醒，或開啟最新穩定版：{latest_release_url}"
      actions:
        continue: "繼續"
        open_release_and_exit: "開啟發佈頁並退出"
    eula:
      title: "授權協議"
      message: "繼續之前需要閱讀並接受啟動器協議。參考位址：{eula_url}"
      actions:
        accept: "接受"
        reject: "拒絕並退出"
        open: "開啟協議"
    environment_warning:
      title: "環境警告"
      message: "目前執行環境需要注意：\n{warnings}"
      actions:
        acknowledge: "我知道了"
launch:
  notifications:
    success: "{instance_name} 已成功啟動。"
    abort_with_hint: "啟動已取消：{hint}"
    script_export_canceled: "匯出啟動腳本已完成，啟動流程已中止。"
    launch_canceled: "啟動已取消。"
    none: ""
  precheck:
    failures:
      instance_path_reserved_chars: "實例路徑中不可包含 ! 或 ;（{path}）。"
      instance_indie_path_reserved_chars: "獨立遊戲路徑中不可包含 ! 或 ;（{path}）。"
      instance_not_selected: "目前未選擇實例。"
      instance_has_error: "目前實例狀態異常：{detail}"
      no_profile_selected: "請先選擇登入檔案後再啟動。"
      microsoft_profile_required: "目前實例要求使用微軟檔案啟動。"
      auth_profile_required: "目前實例要求使用外置登入檔案啟動。"
      auth_server_mismatch: "目前外置登入檔案與實例要求的認證伺服器不一致。"
      microsoft_or_auth_profile_required: "目前實例要求使用微軟檔案或符合認證伺服器的外置登入檔案啟動。"
      unknown: "目前實例尚未滿足啟動條件。"
  prompts:
    non_ascii_path:
      title: "非 ASCII 路徑警告"
      message: "{instance_name} 目前使用包含非 ASCII 字元的路徑，部分 Java 執行環境或模組可能因此啟動失敗。"
      actions:
        continue: "仍然繼續"
        abort: "取消啟動"
        disable: "不再提醒"
    purchase:
      optional:
        title: "建議綁定正版帳號"
        message: "目前未選擇擁有 Minecraft 正版資格的微軟檔案。如果你已擁有正版，可以重新登入或前往購買：{purchase_url}"
        actions:
          buy: "開啟購買頁"
          continue: "繼續"
      required:
        title: "需要正版資格"
        message: "目前功能要求使用擁有 Minecraft 正版資格的微軟檔案。"
        actions:
          buy: "開啟購買頁"
          demo: "以試玩模式啟動"
          abort: "取消啟動"
    java_missing:
      title: "缺少 Java 執行環境"
      manual_java7_with_legacy_fixer:
        message: "目前實例需要 Java 7，且還涉及舊版 Forge 相容處理。請先手動安裝對應的 Java 7 再啟動。"
      manual_java7:
        message: "目前實例需要 Java 7。請先手動安裝對應的 Java 7 再啟動。"
      manual_java8u141_to_320:
        message: "目前實例需要 Java 8 Update 141 到 320 之間的版本。請先手動安裝相容的 Java 8 再啟動。"
      manual_java8u141_plus:
        message: "目前實例需要 Java 8 Update 141 或更新版本。請先手動安裝相容的 Java 8 再啟動。"
      actions:
        confirm: "關閉"
      auto_download:
        title: "下載 Java 執行環境"
        message: "目前沒有可用的相容執行環境。是否自動下載並註冊 {version}？"
        actions:
          download: "下載"
          cancel: "取消"
    support:
      title: "第 {launch_count} 次啟動"
      message: "你已累計啟動遊戲 {launch_count} 次。如果 PCL-ME 對你有幫助，可以考慮贊助專案。"
      actions:
        sponsor: "贊助"
        continue: "繼續"
    java_compatibility:
      title: "Java 相容性警告"
      message: "{runtime_label} 可能不符合目前實例要求的 Java 範圍（{minimum_version} - {maximum_version}）。"
      actions:
        force_current: "繼續使用目前 Java"
        use_compatible: "改用相容 Java"
        abort: "取消啟動"
crash:
  prompts:
    output:
      message: "{message}"
      launch_failure:
        title: "啟動失敗"
