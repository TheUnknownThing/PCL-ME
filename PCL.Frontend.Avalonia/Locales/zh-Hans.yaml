startup:
  prompts:
    special_build:
      title: "特殊构建"
      debug:
        message: "当前启动器为调试构建，可能不稳定。可设置环境变量 {hint_env_var} 关闭此提醒，或打开最新稳定版：{latest_release_url}"
      ci:
        message: "当前启动器来自 CI 构建，可能并不完整。可设置环境变量 {hint_env_var} 关闭此提醒，或打开最新稳定版：{latest_release_url}"
      actions:
        continue: "继续"
        open_release_and_exit: "打开发布页并退出"
    eula:
      title: "许可协议"
      message: "继续之前需要阅读并接受启动器协议。参考地址：{eula_url}"
      actions:
        accept: "接受"
        reject: "拒绝并退出"
        open: "打开协议"
    environment_warning:
      title: "环境警告"
      message: "当前运行环境需要注意：\n{warnings}"
      actions:
        acknowledge: "我知道了"
launch:
  notifications:
    success: "{instance_name} 已成功启动。"
    abort_with_hint: "启动已取消：{hint}"
    script_export_canceled: "导出启动脚本已完成，启动流程已中止。"
    launch_canceled: "启动已取消。"
    none: ""
  precheck:
    failures:
      instance_path_reserved_chars: "实例路径中不可包含 ! 或 ;（{path}）。"
      instance_indie_path_reserved_chars: "独立游戏路径中不可包含 ! 或 ;（{path}）。"
      instance_not_selected: "当前未选择实例。"
      instance_has_error: "当前实例状态异常：{detail}"
      no_profile_selected: "请先选择登录档案后再启动。"
      microsoft_profile_required: "当前实例要求使用微软档案启动。"
      auth_profile_required: "当前实例要求使用外置登录档案启动。"
      auth_server_mismatch: "当前外置登录档案与实例要求的认证服务器不一致。"
      microsoft_or_auth_profile_required: "当前实例要求使用微软档案或匹配认证服务器的外置登录档案启动。"
      unknown: "当前实例尚未满足启动条件。"
  prompts:
    non_ascii_path:
      title: "非 ASCII 路径警告"
      message: "{instance_name} 当前使用包含非 ASCII 字符的路径，部分 Java 运行时或模组可能因此启动失败。"
      actions:
        continue: "仍然继续"
        abort: "取消启动"
        disable: "不再提醒"
    purchase:
      optional:
        title: "建议绑定正版账号"
        message: "当前未选择拥有 Minecraft 正版资格的微软档案。如果你已拥有正版，可以重新登录或前往购买：{purchase_url}"
        actions:
          buy: "打开购买页"
          continue: "继续"
      required:
        title: "需要正版资格"
        message: "当前功能要求使用拥有 Minecraft 正版资格的微软档案。"
        actions:
          buy: "打开购买页"
          demo: "以演示模式启动"
          abort: "取消启动"
    java_missing:
      title: "缺少 Java 运行时"
      manual_java7_with_legacy_fixer:
        message: "当前实例需要 Java 7，并且还涉及旧版 Forge 兼容处理。请先手动安装匹配的 Java 7 再启动。"
      manual_java7:
        message: "当前实例需要 Java 7。请先手动安装匹配的 Java 7 再启动。"
      manual_java8u141_to_320:
        message: "当前实例需要 Java 8 Update 141 到 320 之间的版本。请先手动安装兼容的 Java 8 再启动。"
      manual_java8u141_plus:
        message: "当前实例需要 Java 8 Update 141 或更新版本。请先手动安装兼容的 Java 8 再启动。"
      actions:
        confirm: "关闭"
      auto_download:
        title: "下载 Java 运行时"
        message: "当前没有可用的兼容运行时。是否自动下载并注册 {version}？"
        actions:
          download: "下载"
          cancel: "取消"
    support:
      title: "第 {launch_count} 次启动"
      message: "你已经累计启动游戏 {launch_count} 次。如果 PCL-ME 对你有帮助，可以考虑赞助项目。"
      actions:
        sponsor: "赞助"
        continue: "继续"
    java_compatibility:
      title: "Java 兼容性警告"
      message: "{runtime_label} 可能不满足当前实例要求的 Java 范围（{minimum_version} - {maximum_version}）。"
      actions:
        force_current: "继续使用当前 Java"
        use_compatible: "改用兼容 Java"
        abort: "取消启动"
crash:
  prompts:
    output:
      message: "{message}"
      launch_failure:
        title: "启动失败"
      manual_analysis:
        title: "崩溃分析"
      actions:
        close: "关闭"
        open_instance_settings: "打开实例设置"
        view_log: "查看日志"
        export_report: "导出报告"
  export:
    heading: "导出计划"
    suggested_archive: "- 建议压缩包：{archive_name}"
    source_file_count: "- 源文件数量：{file_count}"
