        title: Descripción general de la sala limpia
      fabric:
        body: >-
          Fabric Loader es un cargador de mods liviano para Minecraft moderno. Debes instalarlo antes de usar los mods Fabric.

          Esta página proporciona la descarga del instalador de Fabric. Después de descargarlo, aún deberá abrir el instalador manualmente para completar la configuración.
        title: Descripción general de la tela
