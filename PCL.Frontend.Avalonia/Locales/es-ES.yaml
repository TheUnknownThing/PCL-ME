        body: Forge es un cargador de mods. Debes instalar Forge antes de poder usar los mods de Forge.
        title: Descripción general de la forja
      labymod:
        body: >-
          LabyMod es un cliente de Minecraft optimizado.

          Esta página proporciona la descarga del instalador de LabyMod. Después de descargarlo, aún deberá abrir el instalador manualmente para completar la configuración.
        title: Descripción general de LabyMod
      legacy_fabric:
        body: >-
          Legacy Fabric es un backport de Fabric para versiones anteriores de Minecraft. Debes instalarlo antes de usar las modificaciones Legacy Fabric.

          Esta página proporciona la descarga del instalador de Legacy Fabric. Después de descargarlo, aún deberá abrir el instalador manualmente para completar la configuración.
        title: Descripción general del tejido heredado
      liteloader:
        body: Al igual que Forge, LiteLoader se puede utilizar para cargar modificaciones de LiteLoader para versiones anteriores de Minecraft.
        title: Descripción general de LiteLoader
      neoforge:
        body: >-
          NeoForge es un cargador de mods para Minecraft 1.20.1 y posteriores. Lo necesita antes de instalar mods de NeoForge y también es compatible con algunos mods de Forge.

          Esta página proporciona la descarga del instalador de NeoForge. Después de descargarlo, aún deberá abrir el instalador manualmente para completar la configuración.
        title: Descripción general de NeoForge
      optifine:
        body: OptiFine, también conocido como HD Fix, permite la instalación de sombreadores, paquetes de recursos de alta resolución y mejoras de rendimiento, pero tiene una compatibilidad más débil con las modificaciones.
        title: Descripción general de OptiFine
      quilt:
        body: >-
          Quilt Loader es un cargador de mods modular y liviano para Minecraft moderno. Debes instalarlo antes de usar los mods de Quilt.

          Esta página proporciona la descarga del instalador de Quilt. Después de descargarlo, aún deberá abrir el instalador manualmente para completar la configuración.
        title: Descripción general de la colcha
