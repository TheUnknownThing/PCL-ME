      title: Guía de empaquetado de Modpack
      step_1: 1. Primero confirme el nombre del paquete, la versión y el contenido seleccionado en la página de exportación de la instancia.
      step_2: 2. Si desea reutilizar las mismas reglas de exportación, primero guarde la configuración para poder importarla más tarde.
      step_3: 3. Incluir mods de paquetes de archivos de recursos, paquetes de recursos y paquetes de sombreadores directamente en el archivo, lo cual es útil para la distribución sin conexión.
      step_4: 4. El modo de carga de Modrinth genera un archivo `.mrpack`, que es mejor para continuar empaquetando y publicando.
      step_5: 5. Después de exportar, verifique que la estructura y el contenido del archivo generado coincidan con la instancia actual.
