        title: Cleanroom-Überblick
      fabric:
        body: |-
          Fabric Loader ist ein leichter Mod-Loader für modernes Minecraft. Du musst ihn installieren, bevor du Fabric-Mods verwenden kannst.
          Diese Seite stellt den Download des Fabric-Installers bereit. Nach dem Herunterladen musst du den Installer immer noch manuell öffnen, um die Einrichtung abzuschließen.
        title: Fabric-Überblick
      forge:
        body: Forge ist ein Mod-Loader. Du musst Forge installieren, bevor du Forge-Mods verwenden kannst.
        title: Forge-Überblick
      labymod:
        body: |-
          LabyMod ist ein optimierter Minecraft-Client.
          Diese Seite stellt den Download des LabyMod-Installers bereit. Nach dem Herunterladen musst du den Installer immer noch manuell öffnen, um die Einrichtung abzuschließen.
        title: LabyMod-Überblick
      legacy_fabric:
        body: |-
          Legacy Fabric ist eine Rückportierung von Fabric für ältere Minecraft-Versionen. Du musst es installieren, bevor du Legacy-Fabric-Mods verwenden kannst.
          Diese Seite stellt den Download des Legacy-Fabric-Installers bereit. Nach dem Herunterladen musst du den Installer immer noch manuell öffnen, um die Einrichtung abzuschließen.
        title: Legacy-Fabric-Überblick
