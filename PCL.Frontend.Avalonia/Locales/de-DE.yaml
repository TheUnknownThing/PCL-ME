        body: "Ähnlich wie Forge kann LiteLoader verwendet werden, um LiteLoader-Mods für ältere Minecraft-Versionen zu laden."
        title: LiteLoader-Überblick
      neoforge:
        body: |-
          NeoForge ist ein Mod-Loader für Minecraft 1.20.1 und neuer. Du benötigst ihn vor der Installation von NeoForge-Mods, und er ist außerdem mit einigen Forge-Mods kompatibel.
          Diese Seite stellt den Download des NeoForge-Installers bereit. Nach dem Herunterladen musst du den Installer immer noch manuell öffnen, um die Einrichtung abzuschließen.
        title: NeoForge-Überblick
      optifine:
        body: "OptiFine, auch als HD-Fix bekannt, ermöglicht die Installation von Shadern, hochauflösende Ressourcenpakete und Leistungsverbesserungen, hat aber eine schwächere Mod-Kompatibilität."
        title: OptiFine-Überblick
      quilt:
