welcome:
  step_0:
    title: Sprache auswählen
    description: Wählen Sie die Anzeigesprache für PCL ME aus.
  step_1:
    title: Lizenzvereinbarung
    description: Bitte lesen und akzeptieren Sie die Endbenutzer-Lizenzvereinbarung (EULA), bevor Sie PCL ME verwenden.
    eula_summary: PCL ME ist eine kostenlose, quelloffene Software und wird "wie sie ist" bereitgestellt. Durch die Nutzung akzeptieren Sie die Bedingungen der Endbenutzer-Lizenzvereinbarung. Lesen Sie die vollständige EULA für Details zu zulässiger Nutzung und Weitergabe.
    open_eula: Vollständige EULA öffnen
    accept_label: Ich habe die EULA gelesen und akzeptiere sie
    decline: Ablehnen und beenden
  step_2:
    title: Design auswählen
    description: Wählen Sie einen Farbmodus und eine Akzentfarbe. Sie können dies jederzeit in den Einstellungen ändern.
  step_3:
    title: Alles bereit!
    description: PCL ME ist einsatzbereit. Erkunden Sie die folgenden Links.
    feedback: Feedback senden
    github: GitHub
