      step_2: 2. Si vous souhaitez réutiliser les mêmes règles d'exportation, enregistrez d'abord la configuration afin de pouvoir l'importer plus tard.
      step_3: 3. Inclure les mods, packs de ressources et packs de shaders directement dans l'archive est utile pour une distribution hors ligne.
      step_4: 4. Le mode de téléchargement de Modrinth génère un fichier « .mrpack », ce qui est préférable pour un packaging et une publication continus.
      step_5: 5. Après l'exportation, vérifiez que la structure et le contenu de l'archive générée correspondent à l'instance actuelle.
