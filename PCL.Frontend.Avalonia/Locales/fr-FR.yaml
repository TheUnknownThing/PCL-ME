        title: Présentation de Cleanroom
      fabric:
        body: |-
          Fabric Loader est un chargeur de mods léger pour Minecraft moderne. Vous devez l'installer avant d'utiliser les mods Fabric.
          Cette page permet de télécharger le programme d'installation de Fabric. Après l'avoir téléchargé, vous devez toujours ouvrir le programme d'installation manuellement pour terminer la configuration.
        title: Présentation de Fabric
      forge:
        body: Forge est un chargeur de mods. Vous devez installer Forge avant de pouvoir utiliser les mods Forge.
        title: Présentation de Forge
      labymod:
        body: |-
          LabyMod est un client Minecraft optimisé.
          Cette page fournit le téléchargement du programme d'installation de LabyMod. Après l'avoir téléchargé, vous devez toujours ouvrir le programme d'installation manuellement pour terminer la configuration.
        title: Présentation de LabyMod
      legacy_fabric:
        body: |-
          Legacy Fabric est un rétroportage de Fabric pour les anciennes versions de Minecraft. Vous devez l'installer avant d'utiliser les mods Legacy Fabric.
          Cette page permet de télécharger le programme d'installation de Legacy Fabric. Après l'avoir téléchargé, vous devez toujours ouvrir le programme d'installation manuellement pour terminer la configuration.
        title: Présentation de Legacy Fabric
      liteloader:
        body: Semblable à Forge, LiteLoader peut être utilisé pour charger des mods LiteLoader pour les anciennes versions de Minecraft.
        title: Présentation du LiteLoader
      neoforge:
        body: |-
          NeoForge est un chargeur de mods pour Minecraft 1.20.1 et versions ultérieures. Vous en avez besoin avant d'installer les mods NeoForge, et il est également compatible avec certains mods Forge.
          Cette page fournit le téléchargement du programme d'installation de NeoForge. Après l'avoir téléchargé, vous devez toujours ouvrir le programme d'installation manuellement pour terminer la configuration.
        title: Présentation de NeoForge
      optifine:
        body: OptiFine, également connu sous le nom de HD Fix, permet l'installation de shaders, des packs de ressources haute résolution et des améliorations de performances, mais sa compatibilité avec les mods est plus faible.
        title: Présentation de OptiFine
      quilt:
        body: |-
          Quilt Loader est un chargeur de mods léger et modulaire pour Minecraft moderne. Vous devez l'installer avant d'utiliser les mods Quilt.
          Cette page fournit le téléchargement du programme d'installation de Quilt. Après l'avoir téléchargé, vous devez toujours ouvrir le programme d'installation manuellement pour terminer la configuration.
        title: Présentation de Quilt
