        title: Cleanroom 개요
      fabric:
        body: |-
          Fabric Loader는 최신 Minecraft용 경량 모드 로더입니다. Fabric 모드를 사용하기 전에 먼저 설치해야 합니다.
          이 페이지에서는 Fabric 설치 프로그램 다운로드를 제공합니다. 다운로드한 후에도 설치 프로그램을 수동으로 열어 설정을 완료해야 합니다.
        title: 패브릭 개요
      forge:
        body: Forge는 모드 로더입니다. Forge 모드를 사용하려면 먼저 Forge를 설치해야 합니다.
        title: 포지 개요
      labymod:
        body: |-
          LabyMod는 최적화된 마인크래프트 클라이언트입니다.
          이 페이지에서는 LabyMod 설치 프로그램 다운로드를 제공합니다. 다운로드한 후에도 설치 프로그램을 수동으로 열어 설정을 완료해야 합니다.
        title: LabyMod 개요
      legacy_fabric:
        body: |-
          Legacy Fabric은 이전 Minecraft 버전용 Fabric의 백포트입니다. Legacy Fabric 모드를 사용하기 전에 먼저 설치해야 합니다.
          이 페이지에서는 Legacy Fabric 설치 프로그램 다운로드를 제공합니다. 다운로드한 후에도 설치 프로그램을 수동으로 열어 설정을 완료해야 합니다.
        title: Legacy Fabric 개요
      liteloader:
        body: Forge와 마찬가지로 LiteLoader를 사용하여 이전 Minecraft 버전용 LiteLoader 모드를 로드할 수 있습니다.
        title: LiteLoader 개요
      neoforge:
        body: |-
          NeoForge는 Minecraft 1.20.1 이상용 모드 로더입니다. NeoForge 모드를 설치하기 전에 필요하며 일부 Forge 모드와도 호환됩니다.
          이 페이지에서는 NeoForge 설치 프로그램 다운로드를 제공합니다. 다운로드한 후에도 설치 프로그램을 수동으로 열어 설정을 완료해야 합니다.
        title: NeoForge 개요
      optifine:
        body: HD 픽스라고도 알려진 OptiFine을 사용하면 셰이더 설치, 고해상도 리소스 팩, 성능 향상이 가능하지만 모드와의 호환성이 약합니다.
        title: OptiFine 개요
      quilt:
        body: |-
          Quilt Loader는 현대 Minecraft를 위한 경량의 모듈식 모드 로더입니다. Quilt 모드를 사용하기 전에 먼저 설치해야 합니다.
