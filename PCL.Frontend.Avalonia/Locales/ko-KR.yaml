welcome:
  step_0:
    title: 언어 선택
    description: PCL ME에서 사용할 표시 언어를 선택하세요.
  step_1:
    title: 라이선스 계약
    description: PCL ME를 사용하기 전에 최종 사용자 라이선스 계약(EULA)을 읽고 동의해 주세요.
    eula_summary: PCL ME는 "있는 그대로" 제공되는 무료 오픈 소스 소프트웨어입니다. 계속 진행하면 최종 사용자 라이선스 계약(EULA)의 조건에 동의하는 것으로 간주됩니다. 허용된 사용 및 재배포에 대한 자세한 내용은 전체 EULA를 읽어주세요.
    open_eula: 전체 EULA 열기
    accept_label: EULA를 읽었으며 동의합니다
    decline: 거부 및 종료
  step_2:
    title: 테마 선택
    description: 색상 모드와 강조 색상을 선택하세요. 설정에서 언제든지 변경할 수 있습니다.
  step_3:
    title: 준비 완료!
    description: PCL ME를 사용할 준비가 되었습니다. 아래 링크를 확인해 보세요.
    feedback: 피드백 제출
    github: GitHub
